<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yixing Li (Vera) | Urban Data Science</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Tokens ───────────────────────────────────────────── */
    :root {
      --bg:       #07070d;
      --bg-s:     #0d0d16;
      --text:     #eeeef5;
      --muted:    #80809a;
      --dim:      #48486a;
      --blue:     #5585f0;
      --purple:   #9068e4;
      --amber:    #d4a84b;
      --glow-b:   rgba(85,133,240,.2);
      --glow-p:   rgba(144,104,228,.18);
      --glass:    rgba(255,255,255,.035);
      --glass-b:  rgba(255,255,255,.07);
      --nav-h:    58px;
      --serif: 'Cormorant Garant', Georgia, serif;
      --sans:  'DM Sans', system-ui, sans-serif;
      --mono:  'JetBrains Mono', monospace;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Navigation ───────────────────────────────────────── */
    .site-nav {
      position: fixed;
      inset: 0 0 auto 0;
      height: var(--nav-h);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5rem;
      background: rgba(7,7,13,.8);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(255,255,255,.06);
    }

    .nav-logo {
      font-family: var(--serif);
      font-size: 1.3rem;
      font-weight: 400;
      font-style: italic;
      color: var(--text);
      text-decoration: none;
      letter-spacing: .02em;
    }

    .nav-links {
      display: flex;
      list-style: none;
      gap: 0;
      align-items: center;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: .82rem;
      font-weight: 400;
      padding: .45rem 1rem;
      letter-spacing: .03em;
      transition: color .18s;
      position: relative;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: 6px; left: 1rem; right: 1rem;
      height: 1px;
      background: var(--text);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform .2s ease;
    }

    .nav-links a:hover { color: var(--text); }
    .nav-links a:hover::after { transform: scaleX(1); }

    .nav-links .nav-cta {
      margin-left: .75rem;
      padding: .38rem .9rem;
      border: 1px solid var(--glass-b);
      border-radius: 6px;
      color: var(--text);
      font-size: .8rem;
    }
    .nav-links .nav-cta::after { display: none; }
    .nav-links .nav-cta:hover {
      border-color: rgba(255,255,255,.2);
      background: rgba(255,255,255,.05);
    }

    /* ── Hero ─────────────────────────────────────────────── */
    .hero {
      position: relative;
      min-height: 100vh;
      padding-top: var(--nav-h);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ambient glow — very subtle */
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 65% 50% at 60% 0%, rgba(144,104,228,.14), transparent 55%),
        radial-gradient(ellipse 40% 35% at 5% 80%,  rgba(85,133,240,.1),  transparent 50%);
      pointer-events: none;
    }

    .hero-inner {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      max-width: 1180px;
      margin: 0 auto;
      padding: 4rem 2.5rem 3rem;
      gap: 5rem;
      position: relative;
      z-index: 1;
    }

    /* ── Hero Text ──────────────────────────────────────── */
    .hero-text { display: flex; flex-direction: column; gap: 1.5rem; }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: .6rem;
      font-family: var(--mono);
      font-size: .65rem;
      color: var(--dim);
      letter-spacing: .16em;
      text-transform: uppercase;
    }

    .hero-eyebrow::before {
      content: "";
      display: block;
      width: 24px;
      height: 1px;
      background: var(--dim);
    }

    .hero-name {
      font-family: var(--serif);
      font-size: clamp(3rem, 6.5vw, 5rem);
      font-weight: 300;
      letter-spacing: -.01em;
      line-height: 1.02;
      color: var(--text);
    }

    .hero-name .serif {
      display: block;
      font-family: var(--serif);
      font-style: italic;
      font-weight: 300;
      font-size: clamp(2.4rem, 5.2vw, 4rem);
      color: var(--muted);
      background: none;
      -webkit-text-fill-color: unset;
      letter-spacing: .01em;
    }

    .hero-tagline {
      font-family: var(--sans);
      font-size: clamp(.82rem, 1.3vw, .92rem);
      font-weight: 300;
      color: var(--muted);
      line-height: 1.7;
      min-height: 1.5em;
    }

    .hero-tagline .t-cursor {
      display: inline-block;
      width: 1px;
      height: .9em;
      background: var(--muted);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink .9s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    /* stat tags — minimal, no blobs */
    .hero-pills {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: .45rem;
      padding: .28rem .75rem;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,.08);
      font-size: .73rem;
      font-weight: 400;
      color: var(--muted);
      background: transparent;
      letter-spacing: .02em;
    }

    .pill .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--dim);
      flex-shrink: 0;
    }

    .pill.award .dot { background: var(--amber); }

    /* contact icons */
    .contact-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: .6rem;
      padding-top: .25rem;
    }

    .c-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px; height: 40px;
      border-radius: 8px;
      background: transparent;
      border: 1px solid rgba(255,255,255,.09);
      color: var(--dim);
      text-decoration: none;
      transition: color .18s, border-color .18s, background .18s;
    }

    .c-link:hover {
      color: var(--text);
      border-color: rgba(255,255,255,.2);
      background: rgba(255,255,255,.04);
    }

    .c-link.wide {
      width: auto;
      padding: 0 13px;
      gap: 6px;
      font-size: .75rem;
      font-family: var(--sans);
      font-weight: 400;
      letter-spacing: .01em;
    }

    .c-link svg { width: 18px; height: 18px; }

    /* ── Hero Visual ──────────────────────────────────────── */
    .hero-visual {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .avatar-stage {
      position: relative;
      display: inline-block;
    }

    /* no spinning ring — clean portrait */
    .avatar-stage::before { display: none; }

    .avatar-stage::after {
      content: "";
      position: absolute;
      inset: 8%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(144,104,228,.18), transparent 70%);
      filter: blur(28px);
      z-index: -1;
    }

    .avatar {
      display: block;
      width: 250px;
      height: 310px;
      object-fit: cover;
      object-position: center top;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,.09);
      box-shadow: 0 20px 50px rgba(0,0,0,.45);
    }

    /* ── Scroll indicator ─────────────────────────────────── */
    .scroll-hint {
      position: relative; z-index: 1;
      text-align: center;
      padding: 1.2rem 0 2rem;
      display: flex; flex-direction: column; align-items: center; gap: .4rem;
    }

    .scroll-hint span {
      font-family: var(--mono);
      font-size: .62rem;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--dim);
    }

    .scroll-arrow {
      width: 18px; height: 18px;
      color: var(--dim);
      animation: bounce .3s ease-in-out infinite alternate;
    }

    @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(5px); } }

    /* ── Divider ──────────────────────────────────────────── */
    .section-divider {
      width: 100%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.07), transparent);
    }

    /* ── Projects wrapper ─────────────────────────────────── */
    .projects-section {
      max-width: 1180px;
      margin: 0 auto;
      padding: 5rem 2.5rem 7rem;
    }

    #projects-root { width: 100%; }

    /* ── Responsive ───────────────────────────────────────── */
    @media (max-width: 820px) {
      .hero-inner {
        grid-template-columns: 1fr;
        gap: 3rem;
        padding: 3rem 1.5rem 2rem;
        text-align: center;
      }
      .hero-text { align-items: center; }
      .hero-eyebrow { justify-content: center; }
      .hero-visual { order: -1; }
      .avatar { width: 180px; height: 220px; }
      .nav-links .nav-cta span { display: none; }
      .c-link.wide span { display: none; }
      .c-link.wide { width: 44px; padding: 0; gap: 0; }
    }

    @media (max-width: 500px) {
      .site-nav { padding: 0 1.25rem; }
      .projects-section { padding: 3rem 1.25rem 5rem; }
    }
  </style>
</head>

  <!-- ══ Scripts ═══════════════════════════════════════════ -->
  <script>
    (function () {
      var text = "MSc Urban Data Science @ UCL  ·  Data Product & Spatial Analysis";
      var el = document.getElementById("intro-text");
      var cur = document.getElementById("t-cursor");
      if (!el || !cur) return;
      var i = 0;
      function tick() {
        if (i < text.length) { el.textContent += text[i++]; setTimeout(tick, 52); }
        else { cur.style.display = "none"; }
      }
      setTimeout(tick, 600);
    })();
  </script>
